<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ChangingBackgroundCard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.2.0/remixicon.min.css">
    <link rel="stylesheet" href="ChangingBackgroundCard.css">

</head>
<body>
<div class="container">
    <div class="card__container">
        <article class="card__article">
            <img src="../../assets/images/insect-1.png" alt="image" class="card__img">

            <div class="card__data">
                <h3 class="card__title">Elegant <br> Queen Bee</h3>
                <span class="card__price">$5999</span>
            </div>

            <img src="../../assets/images/bg-card.png" alt="image" class="card__bg">

            <a href="#" class="card__button">
                View More <i class="ri-arrow-right-line"></i>
            </a>
        </article>

        <article class="card__article">
            <img src="../../assets/images/insect-2.png" alt="image" class="card__img">

            <div class="card__data">
                <h3 class="card__title">Mechanical Magic <br> Butterfly</h3>
                <span class="card__price">$3999</span>
            </div>

            <img src="../../assets/images/bg-card.png" alt="image" class="card__bg">

            <a href="#" class="card__button">
                View More <i class="ri-arrow-right-line"></i>
            </a>
        </article>

        <article class="card__article">
            <img src="../../assets/images/insect-3.png" alt="image" class="card__img">

            <div class="card__data">
                <h3 class="card__title">Wonderful <br> Flower Beetle</h3>
                <span class="card__price">$8999</span>
            </div>

            <img src="../../assets/images/bg-card.png" alt="image" class="card__bg">

            <a href="#" class="card__button">
                View More <i class="ri-arrow-right-line"></i>
            </a>
        </article>
    </div>
</div>


</body>
</html>
