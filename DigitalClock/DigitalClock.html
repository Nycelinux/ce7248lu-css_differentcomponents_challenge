<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DigitalClock</title>
    <link rel="stylesheet" href="DigitalClock.css">
</head>
<body>
<div class="wrapper">
    <div class="box">
        <span class="num hour">12</span>
        <span class="text">Hours</span>
    </div>
    <div class="box">
        <span class="num min">12</span>
        <span class="text">mins</span>
    </div>
    <div class="box">
        <span class="num secs">12</span>
        <span class="text">secs</span>
    </div>
    <div class="box">
        <span class="num ampm">pm</span>
    </div>
</div>

<script src="DigitalClock.js"></script>
</body>
</html>
