<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GlassmorphismLoginWithCheckbox</title>
    <link rel="stylesheet" href="GlassmorphismLoginWithCheckbox.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>
<body>
    <div class="container">
        <div class="loginContainer">
            <div class="loginTitle">
                <span>Login</span>
            </div>

            <div class="input-Wrapper">
                <input type="text" id="user" class="input_field" required>
                <label for="user" class="label">Username</label>
                <i class="fa-regular fa-user icon"></i>
            </div>

            <div class="input-Wrapper">
                <input type="password" id="pass" class="input_field" required>
                <label for="pass" class="label">Password</label>
                <i class="fa-solid fa-lock icon"></i>
            </div>

            <div class="remember-forgot">
                <div class="remember-me">
                    <input type="checkbox" id="remember">
                    <label for="remember" class="label">Remember Me</label>
                </div>

                <div class="forgot">
                    <a href="#">Forgot Password</a>
                </div>
            </div>

            <div class="input_wrapper">
                <input type="submit" class="input-submit" value="Login">
            </div>

            <div class="signup">
                <span>No Account? <a href="#">Sign Up</a></span>
            </div>

        </div>

    </div>

</body>
</html>
