<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MultiColorProgressbarCircle</title>
    <link rel="stylesheet" href="MultiColorProgressbarCircle.css">
</head>
<body>
<section id="skills">
    <div class="container">
        <h1 class="sectionHeading">Skills</h1>
    </div>
    <div class="container">
        <div class="progressContainer">
            <div class="box">
                <img src="../assets/images/6.png" alt="App" />
                <h5 class="itemHeading">App Development</h5>
            </div>
            <div class="box">
                <div class="skill">
                    <svg>
                        <circle cx="100" cy="100" r="70"></circle>
                        <circle
                                cx="100"
                                cy="100"
                                r="70"
                                class="progress"
                                data-value="95"
                                data-stroke="#3574f7"
                                data-time="90"
                        ></circle>
                        <circle
                                cx="100"
                                cy="100"
                                r="70"
                                class="progress"
                                data-value="74"
                                data-stroke="#6a38f1"
                                data-time="90"
                        ></circle>
                        <circle
                                cx="100"
                                cy="100"
                                r="70"
                                class="progress"
                                data-value="65"
                                data-stroke="#00c5ea"
                                data-time="90"
                        ></circle>
                    </svg>
                    <span class="dataProgress" data-value="90"></span>
                </div>
                <strong>Basketball</strong>
            </div>
            <div class="box">
                <div class="skill">
                    <svg>
                        <circle cx="100" cy="100" r="70"></circle>
                        <circle
                                cx="100"
                                cy="100"
                                r="70"
                                class="progress"
                                data-value="80"
                                data-stroke="#6352d3"
                                data-time="80"
                        ></circle>
                        <circle
                                cx="100"
                                cy="100"
                                r="70"
                                class="progress"
                                data-value="65"
                                data-stroke="#3574f7"
                                data-time="80"
                        ></circle>
                        <circle
                                cx="100"
                                cy="100"
                                r="70"
                                class="progress"
                                data-value="50"
                                data-stroke="#1ba0fb"
                                data-time="80"
                        ></circle>
                    </svg>
                    <span class="dataProgress" data-value="80"></span>
                </div>
                <strong>JS</strong>
            </div>
            <div class="box">
                <div class="skill">
                    <svg>
                        <circle cx="100" cy="100" r="70"></circle>
                        <circle
                                cx="100"
                                cy="100"
                                r="70"
                                class="progress"
                                data-value="60"
                                data-stroke="#ff7741"
                                data-time="60"
                        ></circle>
                        <circle
                                cx="100"
                                cy="100"
                                r="70"
                                class="progress"
                                data-value="45"
                                data-stroke="#c11c92"
                                data-time="60"
                        ></circle>
                        <circle
                                cx="100"
                                cy="100"
                                r="70"
                                class="progress"
                                data-value="30"
                                data-stroke="#7201d7"
                                data-time="60"
                        ></circle>
                    </svg>
                    <span class="dataProgress" data-value="60"></span>
                </div>
                <strong>React</strong>
            </div>
        </div>
    </div>
</section>

    <script src="MultiColorProgressbarCircle.js"></script>
</body>
</html>
